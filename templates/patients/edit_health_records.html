{% extends "core/base.html" %}
{% block title %}Update Vitals{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 glass-card">
            <div class="text-center mb-5">
                <h2 class="fw-bold text-primary">Update Health Vitals</h2>
                <p class="text-muted">Keep your physical metrics up to date for better AI predictions.</p>
            </div>

            <form method="post">
                <div class="row g-4">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Age</label>
                        <select name="age" class="form-select" required>
                            {% for i in range(1, 121) %}<option value="{{ i }}">{{ i }}</option>{% endfor %}
                        </select>
                    </div>
                    
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Height</label>
                        <div class="input-group">
                            <input type="text" name="height" class="form-control" required>
                            <span class="input-group-text bg-light text-muted">cm</span>
                        </div>
                    </div>
                    
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Weight</label>
                        <div class="input-group">
                            <input type="text" name="weight" class="form-control" required>
                            <span class="input-group-text bg-light text-muted">lbs</span>
                        </div>
                    </div>
                    
                    <div class="col-md-12">
                        <label class="form-label fw-bold">Gender</label>
                        <div class="d-flex gap-4 p-3 border rounded bg-light">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" id="g_male" value="male">
                                <label class="form-check-label" for="g_male">Male</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" id="g_female" value="female">
                                <label class="form-check-label" for="g_female">Female</label>
                            </div>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Medical History Update</label>
                        <textarea name="medical_history" class="form-control" rows="4" required></textarea>
                    </div>

                    <div class="col-12 text-end mt-4">
                        <a href="{{ url_for('patient_dashboard') }}" class="btn btn-link text-muted me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary px-5 rounded-pill">Update Records</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
