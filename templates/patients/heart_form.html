{% extends "core/base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10 glass-card">
            <div class="d-flex align-items-center mb-4 text-danger">
                <i class="bi bi-heart-pulse-fill fs-2 me-3"></i>
                <h2 class="fw-bold m-0 text-dark">Heart Disease Risk Analysis</h2>
            </div>
            
            <form method="POST" class="row g-3">
                <div class="col-12"><h5 class="text-muted border-bottom pb-2 mb-3">Clinical Vitals</h5></div>
                
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Age</label>
                    <input name="age" class="form-control" placeholder="Years" required>
                </div>
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Sex</label>
                    <select name="sex" class="form-select" required>
                        <option value="" disabled selected>Select...</option>
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Chest Pain Type (0-3)</label>
                    <input name="cp" class="form-control" placeholder="0-3" required>
                </div>
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Resting BP (mm Hg)</label>
                    <input name="trestbps" class="form-control" placeholder="120" required>
                </div>
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Serum Cholesterol</label>
                    <input name="chol" class="form-control" placeholder="mg/dl" required>
                </div>
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Fasting BS > 120 (1=True)</label>
                    <select name="fbs" class="form-select" required>
                        <option value="0">False</option>
                        <option value="1">True</option>
                    </select>
                </div>

                <div class="col-12 mt-4"><h5 class="text-muted border-bottom pb-2 mb-3">Heart Function Metrics</h5></div>

                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Resting ECG (0-2)</label>
                    <input name="restecg" class="form-control" placeholder="0, 1, or 2" required>
                </div>
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Max Heart Rate</label>
                    <input name="thalach" class="form-control" placeholder="bpm" required>
                </div>
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Exercise Angina (1=Yes)</label>
                    <select name="exang" class="form-select" required>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">ST Depression (Oldpeak)</label>
                    <input name="oldpeak" class="form-control" placeholder="e.g. 2.5" required>
                </div>
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Slope (0-2)</label>
                    <input name="slope" class="form-control" placeholder="0, 1, or 2" required>
                </div>
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Major Vessels (0-3)</label>
                    <input name="ca" class="form-control" placeholder="0-3" required>
                </div>
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Thal (1-3)</label>
                    <input name="thal" class="form-control" placeholder="1=Normal, 2=Fixed, 3=Rev" required>
                </div>

                <div class="col-12 mt-4 text-center">
                    <button type="submit" class="btn btn-danger btn-lg px-5 rounded-pill shadow">Run AI Prediction Engine</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
