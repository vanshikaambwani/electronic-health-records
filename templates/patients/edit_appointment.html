{% extends "core/base.html" %}
{% block title %}Reschedule Appointment{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card">
                <div class="text-center mb-4">
                    <div class="d-inline-block p-3 rounded-circle bg-warning-soft text-warning mb-3" style="background: rgba(255, 193, 7, 0.1);">
                        <i class="bi bi-calendar-event fs-2" style="color: #f59e0b;"></i>
                    </div>
                    <h2 class="fw-bold">Reschedule Visit</h2>
                    <p class="text-muted">Update appointment for <span class="fw-bold text-dark">{{ patient_name }}</span></p>
                </div>

                <form method="post" action="{{ url_for('edit_appointment', doctor_email=doctor_email) }}">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase text-muted">New Date</label>
                        <input type="date" class="form-control form-control-lg" name="new_date" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase text-muted">New Time</label>
                        <input type="time" class="form-control form-control-lg" name="new_time" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Confirm Changes</button>
                        <a href="{{ url_for('patient_dashboard') }}" class="btn btn-light btn-lg text-muted">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
