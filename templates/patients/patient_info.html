{% extends "core/base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 glass-card">
            <h1 class="fw-bold mb-4 text-primary">Patient Registration</h1>
            <p class="text-muted mb-5">Join LibreHealth to manage your medical records digitally.</p>
            
            <form method="post" class="row g-4">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Age</label>
                    <select name="age" class="form-select" required>
                        {% for i in range(1, 121) %}<option value="{{ i }}">{{ i }}</option>{% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Gender</label>
                    <select name="gender" class="form-select" required>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Height (cm)</label>
                    <input type="text" name="height" class="form-control" placeholder="175" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Weight (lbs)</label>
                    <input type="text" name="weight" class="form-control" placeholder="160" required>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Medical History</label>
                    <textarea name="medical_history" class="form-control" rows="3" placeholder="List any chronic conditions or allergies..." required></textarea>
                </div>
                
                <div class="col-12 d-flex gap-3 pt-4">
                    <button type="submit" class="btn btn-primary px-5 py-3">Register Account</button>
                    <a href="{{ url_for('index') }}" class="btn btn-light px-5 py-3 border">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
