{% extends "core/base.html" %}

{% block title %}Manage Schedule{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg rounded-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="bg-dark text-white rounded-circle p-3 d-inline-block mb-3">
                            <i class="bi bi-clock-history fs-2"></i>
                        </div>
                        <h2 class="fw-bold">Set Availability</h2>
                        <p class="text-muted">Define your open slots for patient bookings.</p>
                    </div>

                    <form method="post" action="{{ url_for('set_availability') }}">
                        <div class="mb-4">
                            <label for="date" class="form-label small fw-bold text-uppercase text-muted">Date</label>
                            <input type="date" class="form-control form-control-lg bg-light border-0" id="date" name="date" required>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <label for="start_time" class="form-label small fw-bold text-uppercase text-muted">Start</label>
                                <input type="time" class="form-control form-control-lg bg-light border-0" id="start_time" name="start_time" required>
                            </div>
                            <div class="col-6">
                                <label for="end_time" class="form-label small fw-bold text-uppercase text-muted">End</label>
                                <input type="time" class="form-control form-control-lg bg-light border-0" id="end_time" name="end_time" required>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-dark btn-lg">Publish Slot</button>
                            <a href="javascript:history.back()" class="btn btn-link text-muted text-decoration-none">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
