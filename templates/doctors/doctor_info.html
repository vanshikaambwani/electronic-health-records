{% extends "core/base.html" %}

{% block title %}Physician Profile{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-0 position-relative overflow-hidden mb-4">
                <div class="bg-primary h-100px w-100 position-absolute top-0 start-0 opacity-10"></div>
                
                <div class="card-body p-5 position-relative z-1">
                    <div class="d-flex align-items-start">
                        <div class="me-4">
                            <div class="bg-white p-1 rounded-circle shadow-sm">
                                <div class="bg-light rounded-circle d-flex align-items-center justify-content-center text-primary" style="width: 100px; height: 100px;">
                                    <i class="bi bi-person-fill display-4"></i>
                                </div>
                            </div>
                        </div>
                        <div class="flex-grow-1 pt-2">
                            <h5 class="text-uppercase text-muted small fw-bold mb-1">Physician Profile</h5>
                            <h1 class="fw-bold mb-2">Dr. {{ doctor_info.name }}</h1>
                            <span class="badge bg-primary rounded-pill px-3 py-2">{{ doctor_info.specialization }}</span>
                        </div>
                    </div>

                    <div class="mt-5 row g-4">
                        <div class="col-md-6">
                            <div class="p-3 bg-light rounded border-start border-4 border-primary h-100">
                                <h6 class="fw-bold text-dark mb-1">Experience</h6>
                                <p class="mb-0 text-muted">{{ doctor_info.experience }} Years of Practice</p>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="p-3 bg-light rounded border-start border-4 border-success h-100">
                                <h6 class="fw-bold text-dark mb-1">Status</h6>
                                <p class="mb-0 text-muted">Currently Accepting Patients</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center">
                <button class="btn btn-outline-secondary rounded-pill px-4" id="backButton">
                    <i class="bi bi-arrow-left me-2"></i>Return to Previous
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('backButton').addEventListener('click', function() {
        window.history.back();
    });
</script>
{% endblock %}
