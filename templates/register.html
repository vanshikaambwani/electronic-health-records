{% extends "core/base.html" %}

{% block title %}Choose Account Type{% endblock %}

{% block content %}
<div class="container-fluid vh-100 d-flex flex-column justify-content-center align-items-center bg-light overflow-hidden">
    
    <div class="row w-100 justify-content-center" style="max-width: 1000px;">
        
        <div class="col-12 text-center mb-4">
            <h1 class="fw-bold text-dark m-0">Join LibreHealth</h1>
            <p class="text-muted small">Select your portal to continue</p>
        </div>

        <form method="post" class="w-100">
            <div class="row g-4 justify-content-center">
                
                <div class="col-md-5">
                    <input type="radio" class="btn-check" name="role" id="patientRadio" value="patient" checked>
                    <label class="card h-100 border-0 shadow-sm cursor-pointer role-card overflow-hidden position-relative" for="patientRadio">
                        <div class="card-img-top bg-light" style="height: 200px; background: url('https://images.unsplash.com/photo-1505751172876-fa1923c5c528?auto=format&fit=crop&q=80') center/cover no-repeat;">
                            <div class="overlay position-absolute w-100 h-100" style="background: rgba(0,0,0,0.2);"></div>
                        </div>
                        <div class="card-body text-center p-4">
                            <h4 class="fw-bold mb-1">Patient</h4>
                            <p class="text-muted small mb-3">Book visits & view history</p>
                            <div class="indicator-ring mx-auto">
                                <i class="bi bi-check-lg"></i>
                            </div>
                        </div>
                    </label>
                </div>

                <div class="col-md-5">
                    <input type="radio" class="btn-check" name="role" id="doctorRadio" value="doctor">
                    <label class="card h-100 border-0 shadow-sm cursor-pointer role-card overflow-hidden position-relative" for="doctorRadio">
                        <div class="card-img-top bg-light" style="height: 200px; background: url('https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?auto=format&fit=crop&q=80') center/cover no-repeat;">
                            <div class="overlay position-absolute w-100 h-100" style="background: rgba(0,0,0,0.2);"></div>
                        </div>
                        <div class="card-body text-center p-4">
                            <h4 class="fw-bold mb-1">Doctor</h4>
                            <p class="text-muted small mb-3">Manage patients & staff</p>
                            <div class="indicator-ring mx-auto">
                                <i class="bi bi-check-lg"></i>
                            </div>
                        </div>
                    </label>
                </div>

            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-dark px-5 rounded-pill shadow-sm fw-bold">
                    Continue <i class="bi bi-arrow-right ms-2"></i>
                </button>
                <div class="mt-3">
                    <a href="{{ url_for('index') }}" class="text-muted small text-decoration-none">Back to Login</a>
                </div>
            </div>
        </form>
    </div>
</div>

<style>
    /* Styling to make it non-bulky and sleek */
    .role-card {
        transition: all 0.2s ease;
        transform: scale(1);
        border: 2px solid transparent !important;
        opacity: 0.9;
    }

    /* Hover effect */
    .role-card:hover {
        transform: translateY(-2px);
        opacity: 1;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
    }

    /* Checkmark Circle Styling */
    .indicator-ring {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 2px solid #ddd;
        color: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
    }

    /* --- ACTIVE STATES --- */

    /* Patient Active */
    #patientRadio:checked + .role-card {
        border-color: var(--bs-primary) !important;
        opacity: 1;
        transform: scale(1.02);
    }
    #patientRadio:checked + .role-card .indicator-ring {
        background-color: var(--bs-primary);
        border-color: var(--bs-primary);
        color: white;
    }

    /* Doctor Active */
    #doctorRadio:checked + .role-card {
        border-color: var(--bs-success) !important;
        opacity: 1;
        transform: scale(1.02);
    }
    #doctorRadio:checked + .role-card .indicator-ring {
        background-color: var(--bs-success);
        border-color: var(--bs-success);
        color: white;
    }
</style>
{% endblock %}
